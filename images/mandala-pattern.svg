<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <pattern id="smallDot" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="1.5" fill="#FFD700" opacity="0.4"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="600" fill="#1B5E20"/>
  <rect width="600" height="600" fill="url(#smallDot)"/>
  
  <!-- Outer ring decoration -->
  <circle cx="300" cy="300" r="285" fill="none" stroke="#FFD700" stroke-width="3"/>
  <circle cx="300" cy="300" r="280" fill="none" stroke="#FFA000" stroke-width="1"/>
  
  <!-- 16 outer petals -->
  <g>
    <ellipse cx="300" cy="60" rx="18" ry="45" fill="#FFD700" opacity="0.9"/>
    <ellipse cx="300" cy="60" rx="18" ry="45" fill="#FFD700" opacity="0.9" transform="rotate(22.5 300 300)"/>
    <ellipse cx="300" cy="60" rx="18" ry="45" fill="#FFD700" opacity="0.9" transform="rotate(45 300 300)"/>
    <ellipse cx="300" cy="60" rx="18" ry="45" fill="#FFD700" opacity="0.9" transform="rotate(67.5 300 300)"/>
    <ellipse cx="300" cy="60" rx="18" ry="45" fill="#FFD700" opacity="0.9" transform="rotate(90 300 300)"/>
    <ellipse cx="300" cy="60" rx="18" ry="45" fill="#FFD700" opacity="0.9" transform="rotate(112.5 300 300)"/>
    <ellipse cx="300" cy="60" rx="18" ry="45" fill="#FFD700" opacity="0.9" transform="rotate(135 300 300)"/>
    <ellipse cx="300" cy="60" rx="18" ry="45" fill="#FFD700" opacity="0.9" transform="rotate(157.5 300 300)"/>
    <ellipse cx="300" cy="60" rx="18" ry="45" fill="#FFD700" opacity="0.9" transform="rotate(180 300 300)"/>
    <ellipse cx="300" cy="60" rx="18" ry="45" fill="#FFD700" opacity="0.9" transform="rotate(202.5 300 300)"/>
    <ellipse cx="300" cy="60" rx="18" ry="45" fill="#FFD700" opacity="0.9" transform="rotate(225 300 300)"/>
    <ellipse cx="300" cy="60" rx="18" ry="45" fill="#FFD700" opacity="0.9" transform="rotate(247.5 300 300)"/>
    <ellipse cx="300" cy="60" rx="18" ry="45" fill="#FFD700" opacity="0.9" transform="rotate(270 300 300)"/>
    <ellipse cx="300" cy="60" rx="18" ry="45" fill="#FFD700" opacity="0.9" transform="rotate(292.5 300 300)"/>
    <ellipse cx="300" cy="60" rx="18" ry="45" fill="#FFD700" opacity="0.9" transform="rotate(315 300 300)"/>
    <ellipse cx="300" cy="60" rx="18" ry="45" fill="#FFD700" opacity="0.9" transform="rotate(337.5 300 300)"/>
  </g>
  
  <!-- Mid ring -->
  <circle cx="300" cy="300" r="210" fill="#1B5E20" opacity="0.8"/>
  <circle cx="300" cy="300" r="210" fill="none" stroke="#FFD700" stroke-width="2"/>
  
  <!-- 12 middle petals -->
  <g>
    <ellipse cx="300" cy="120" rx="15" ry="38" fill="#FFA000" opacity="0.85"/>
    <ellipse cx="300" cy="120" rx="15" ry="38" fill="#FFA000" opacity="0.85" transform="rotate(30 300 300)"/>
    <ellipse cx="300" cy="120" rx="15" ry="38" fill="#FFA000" opacity="0.85" transform="rotate(60 300 300)"/>
    <ellipse cx="300" cy="120" rx="15" ry="38" fill="#FFA000" opacity="0.85" transform="rotate(90 300 300)"/>
    <ellipse cx="300" cy="120" rx="15" ry="38" fill="#FFA000" opacity="0.85" transform="rotate(120 300 300)"/>
    <ellipse cx="300" cy="120" rx="15" ry="38" fill="#FFA000" opacity="0.85" transform="rotate(150 300 300)"/>
    <ellipse cx="300" cy="120" rx="15" ry="38" fill="#FFA000" opacity="0.85" transform="rotate(180 300 300)"/>
    <ellipse cx="300" cy="120" rx="15" ry="38" fill="#FFA000" opacity="0.85" transform="rotate(210 300 300)"/>
    <ellipse cx="300" cy="120" rx="15" ry="38" fill="#FFA000" opacity="0.85" transform="rotate(240 300 300)"/>
    <ellipse cx="300" cy="120" rx="15" ry="38" fill="#FFA000" opacity="0.85" transform="rotate(270 300 300)"/>
    <ellipse cx="300" cy="120" rx="15" ry="38" fill="#FFA000" opacity="0.85" transform="rotate(300 300 300)"/>
    <ellipse cx="300" cy="120" rx="15" ry="38" fill="#FFA000" opacity="0.85" transform="rotate(330 300 300)"/>
  </g>
  
  <!-- Inner ring -->
  <circle cx="300" cy="300" r="155" fill="#1B5E20"/>
  <circle cx="300" cy="300" r="155" fill="none" stroke="#FFD700" stroke-width="2"/>
  
  <!-- 8 inner petals -->
  <g>
    <ellipse cx="300" cy="175" rx="12" ry="30" fill="#4CAF50" opacity="0.9"/>
    <ellipse cx="300" cy="175" rx="12" ry="30" fill="#4CAF50" opacity="0.9" transform="rotate(45 300 300)"/>
    <ellipse cx="300" cy="175" rx="12" ry="30" fill="#4CAF50" opacity="0.9" transform="rotate(90 300 300)"/>
    <ellipse cx="300" cy="175" rx="12" ry="30" fill="#4CAF50" opacity="0.9" transform="rotate(135 300 300)"/>
    <ellipse cx="300" cy="175" rx="12" ry="30" fill="#4CAF50" opacity="0.9" transform="rotate(180 300 300)"/>
    <ellipse cx="300" cy="175" rx="12" ry="30" fill="#4CAF50" opacity="0.9" transform="rotate(225 300 300)"/>
    <ellipse cx="300" cy="175" rx="12" ry="30" fill="#4CAF50" opacity="0.9" transform="rotate(270 300 300)"/>
    <ellipse cx="300" cy="175" rx="12" ry="30" fill="#4CAF50" opacity="0.9" transform="rotate(315 300 300)"/>
  </g>
  
  <!-- Geometric inner pattern -->
  <circle cx="300" cy="300" r="100" fill="#2E7D32" stroke="#FFD700" stroke-width="2"/>
  
  <!-- Star of David / geometric pattern -->
  <polygon points="300,215 340,280 260,280" fill="none" stroke="#FFD700" stroke-width="2"/>
  <polygon points="300,385 260,320 340,320" fill="none" stroke="#FFD700" stroke-width="2"/>
  <polygon points="215,300 280,260 280,340" fill="none" stroke="#FFD700" stroke-width="2"/>
  <polygon points="385,300 320,340 320,260" fill="none" stroke="#FFD700" stroke-width="2"/>
  
  <!-- Innermost circle -->
  <circle cx="300" cy="300" r="52" fill="#1B5E20" stroke="#FFD700" stroke-width="2"/>
  <circle cx="300" cy="300" r="40" fill="#2E7D32" stroke="#FFA000" stroke-width="1.5"/>
  
  <!-- Center OM or lotus -->
  <text x="300" y="315" font-family="serif" font-size="42" fill="#FFD700" text-anchor="middle" font-weight="bold">ॐ</text>
  
  <!-- Corner decorations -->
  <circle cx="300" cy="300" r="3" fill="#FFD700"/>
  
  <!-- Dots ring -->
  <circle cx="300" cy="248" r="3" fill="#FFD700"/>
  <circle cx="300" cy="352" r="3" fill="#FFD700"/>
  <circle cx="248" cy="300" r="3" fill="#FFD700"/>
  <circle cx="352" cy="300" r="3" fill="#FFD700"/>
  <circle cx="262" cy="262" r="3" fill="#FFD700"/>
  <circle cx="338" cy="262" r="3" fill="#FFD700"/>
  <circle cx="262" cy="338" r="3" fill="#FFD700"/>
  <circle cx="338" cy="338" r="3" fill="#FFD700"/>
</svg>
