      <ellipse cx="0" cy="-200" rx="8" ry="25" fill="#C9A84C" opacity="0.3"/>
    </g>
    <g transform="rotate(22.5)">
      <ellipse cx="0" cy="-200" rx="18" ry="40" class="gold" stroke-width="1.2" opacity="0.8"/>
      <ellipse cx="0" cy="-200" rx="8" ry="25" fill="#C9A84C" opacity="0.3"/>
    </g>
    <g transform="rotate(45)">
      <ellipse cx="0" cy="-200" rx="18" ry="40" class="gold" stroke-width="1.2" opacity="0.8"/>
      <ellipse cx="0" cy="-200" rx="8" ry="25" fill="#C9A84C" opacity="0.3"/>
    </g>
    <g transform="rotate(67.5)">
      <ellipse cx="0" cy="-200" rx="18" ry="40" class="gold" stroke-width="1.2" opacity="0.8"/>
      <ellipse cx="0" cy="-200" rx="8" ry="25" fill="#C9A84C" opacity="0.3"/>
    </g>
