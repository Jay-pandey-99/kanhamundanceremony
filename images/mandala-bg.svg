<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <style>
      .gold { fill: none; stroke: #C9A84C; }
      .gold-fill { fill: #C9A84C; }
      .gold-light { fill: none; stroke: #F0D080; }
    </style>
  </defs>
  <!-- Outer ring -->
  <circle cx="250" cy="250" r="240" class="gold" stroke-width="1.5" opacity="0.6"/>
  <circle cx="250" cy="250" r="230" class="gold" stroke-width="0.8" opacity="0.4"/>

