    <g><ellipse cx="0" cy="-140" rx="16" ry="35" class="gold" stroke-width="1.2" opacity="0.85"/><ellipse cx="0" cy="-140" rx="7" ry="20" fill="#C9A84C" opacity="0.35"/></g>
    <g transform="rotate(30)"><ellipse cx="0" cy="-140" rx="16" ry="35" class="gold" stroke-width="1.2" opacity="0.85"/><ellipse cx="0" cy="-140" rx="7" ry="20" fill="#C9A84C" opacity="0.35"/></g>
    <g transform="rotate(60)"><ellipse cx="0" cy="-140" rx="16" ry="35" class="gold" stroke-width="1.2" opacity="0.85"/><ellipse cx="0" cy="-140" rx="7" ry="20" fill="#C9A84C" opacity="0.35"/></g>
    <g transform="rotate(90)"><ellipse cx="0" cy="-140" rx="16" ry="35" class="gold" stroke-width="1.2" opacity="0.85"/><ellipse cx="0" cy="-140" rx="7" ry="20" fill="#C9A84C" opacity="0.35"/></g>
    <g transform="rotate(120)"><ellipse cx="0" cy="-140" rx="16" ry="35" class="gold" stroke-width="1.2" opacity="0.85"/><ellipse cx="0" cy="-140" rx="7" ry="20" fill="#C9A84C" opacity="0.35"/></g>
