  <circle cx="250" cy="250" r="95" class="gold" stroke-width="0.6" opacity="0.5"/>

  <!-- Inner petals (8) -->
  <g transform="translate(250,250)">
    <g><ellipse cx="0" cy="-80" rx="12" ry="25" class="gold" stroke-width="1.5" opacity="0.9"/><ellipse cx="0" cy="-80" rx="6" ry="14" fill="#C9A84C" opacity="0.5"/></g>
    <g transform="rotate(45)"><ellipse cx="0" cy="-80" rx="12" ry="25" class="gold" stroke-width="1.5" opacity="0.9"/><ellipse cx="0" cy="-80" rx="6" ry="14" fill="#C9A84C" opacity="0.5"/></g>
    <g transform="rotate(90)"><ellipse cx="0" cy="-80" rx="12" ry="25" class="gold" stroke-width="1.5" opacity="0.9"/><ellipse cx="0" cy="-80" rx="6" ry="14" fill="#C9A84C" opacity="0.5"/></g>
    <g transform="rotate(135)"><ellipse cx="0" cy="-80" rx="12" ry="25" class="gold" stroke-width="1.5" opacity="0.9"/><ellipse cx="0" cy="-80" rx="6" ry="14" fill="#C9A84C" opacity="0.5"/></g>
    <g transform="rotate(180)"><ellipse cx="0" cy="-80" rx="12" ry="25" class="gold" stroke-width="1.5" opacity="0.9"/><ellipse cx="0" cy="-80" rx="6" ry="14" fill="#C9A84C" opacity="0.5"/></g>
    <g transform="rotate(225)"><ellipse cx="0" cy="-80" rx="12" ry="25" class="gold" stroke-width="1.5" opacity="0.9"/><ellipse cx="0" cy="-80" rx="6" ry="14" fill="#C9A84C" opacity="0.5"/></g>
    <g transform="rotate(270)"><ellipse cx="0" cy="-80" rx="12" ry="25" class="gold" stroke-width="1.5" opacity="0.9"/><ellipse cx="0" cy="-80" rx="6" ry="14" fill="#C9A84C" opacity="0.5"/></g>
    <g transform="rotate(315)"><ellipse cx="0" cy="-80" rx="12" ry="25" class="gold" stroke-width="1.5" opacity="0.9"/><ellipse cx="0" cy="-80" rx="6" ry="14" fill="#C9A84C" opacity="0.5"/></g>
  </g>

  <!-- Decorative lines from center (star pattern) -->
  <g transform="translate(250,250)" stroke="#C9A84C" stroke-width="0.8" opacity="0.5">
    <line x1="0" y1="-55" x2="0" y2="-100"/>
    <line x1="0" y1="-55" x2="0" y2="-100" transform="rotate(30)"/>
    <line x1="0" y1="-55" x2="0" y2="-100" transform="rotate(60)"/>
    <line x1="0" y1="-55" x2="0" y2="-100" transform="rotate(90)"/>
    <line x1="0" y1="-55" x2="0" y2="-100" transform="rotate(120)"/>
    <line x1="0" y1="-55" x2="0" y2="-100" transform="rotate(150)"/>
    <line x1="0" y1="-55" x2="0" y2="-100" transform="rotate(180)"/>
    <line x1="0" y1="-55" x2="0" y2="-100" transform="rotate(210)"/>
    <line x1="0" y1="-55" x2="0" y2="-100" transform="rotate(240)"/>
    <line x1="0" y1="-55" x2="0" y2="-100" transform="rotate(270)"/>
    <line x1="0" y1="-55" x2="0" y2="-100" transform="rotate(300)"/>
    <line x1="0" y1="-55" x2="0" y2="-100" transform="rotate(330)"/>
  </g>

  <!-- Inner decorative ring -->
  <circle cx="250" cy="250" r="55" class="gold" stroke-width="1.5" opacity="0.9"/>
  <circle cx="250" cy="250" r="48" class="gold" stroke-width="1" opacity="0.7"/>

  <!-- Center diamond pattern -->
  <g transform="translate(250,250)">
    <polygon points="0,-40 28,0 0,40 -28,0" class="gold" stroke-width="1.5" opacity="0.8"/>
    <polygon points="0,-40 28,0 0,40 -28,0" class="gold" stroke-width="1.5" opacity="0.8" transform="rotate(45)"/>
    <circle cx="0" cy="0" r="18" fill="#C9A84C" opacity="0.25"/>
    <circle cx="0" cy="0" r="12" class="gold" stroke-width="2" opacity="0.9"/>
    <circle cx="0" cy="0" r="6" fill="#C9A84C" opacity="0.6"/>
  </g>

  <!-- Small decorative dots on outer ring -->
  <g fill="#C9A84C" opacity="0.6">
    <circle cx="250" cy="12" r="4"/>
    <circle cx="420" cy="80" r="4"/>
    <circle cx="488" cy="250" r="4"/>
    <circle cx="420" cy="420" r="4"/>
    <circle cx="250" cy="488" r="4"/>
    <circle cx="80" cy="420" r="4"/>
    <circle cx="12" cy="250" r="4"/>
    <circle cx="80" cy="80" r="4"/>
